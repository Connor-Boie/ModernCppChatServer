name: C++ CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show tool versions
        run: |
          cmake --version
          g++ --version
          python --version

      - name: Configure CMake
        run: |
          cmake \
            -S . \
            -B build \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          cmake \
            --build build \
            --config Debug \
            --parallel

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --build-config Debug \
            --output-on-failure